# Auto-generated by SpecKit Pipeline
name: SpecKit CI & Deploy

on:
  push:
    branches:
      - 'feat/speckit-**'
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write
  pull-requests: write

jobs:
  test:
    name: Pytest
    runs-on: ubuntu-latest
    outputs:
      status: ${{ job.status }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install pytest
        run: pip install pytest
      - name: Run tests
        run: pytest -v --tb=short

  deploy:
    name: Deploy to gh-pages
    needs: test
    if: success()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Prepare deploy dir
        run: |
          # 当前分支名映射到子目录：main → /，feat/speckit-xxx → /xxx/
          BRANCH="${{ github.ref_name }}"
          if [[ "$BRANCH" == "main" ]]; then
            SUBDIR="."
          else
            SUBDIR="${BRANCH##*/}"   # feat/speckit-xxx → speckit-xxx
          fi
          echo "SUBDIR=$SUBDIR" >> $GITHUB_ENV
          mkdir -p _site/$SUBDIR
          # 只复制静态资源（HTML/CSS/JS/README），不复制 Python
          find . -maxdepth 1 -type f \( -name "*.html" -o -name "*.css" -o -name "*.js" -o -name "*.md" \) -exec cp {} _site/$SUBDIR/ \;
      - name: Checkout gh-pages (may not exist)
        run: |
          git fetch origin gh-pages:gh-pages 2>/dev/null || git checkout --orphan gh-pages
      - name: Merge new subdir into gh-pages tree
        run: |
          # 切到一个干净工作区，把现有 gh-pages 内容拉下来后覆盖子目录
          mkdir -p /tmp/ghpages
          git --work-tree=/tmp/ghpages checkout gh-pages -- . 2>/dev/null || true
          cp -r _site/* /tmp/ghpages/
          cd /tmp/ghpages
          git init -q -b gh-pages
          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "deploy: ${{ github.ref_name }} @ ${{ github.sha }}" || echo "nothing to commit"
          git push -f origin gh-pages

      - name: Write Pages URL to summary
        run: |
          OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO="${{ github.event.repository.name }}"
          if [[ "$SUBDIR" == "." ]]; then
            URL="https://$OWNER_LOWER.github.io/$REPO/"
          else
            URL="https://$OWNER_LOWER.github.io/$REPO/$SUBDIR/"
          fi
          echo "::notice title=Preview URL::$URL"
          echo "PREVIEW_URL=$URL" >> $GITHUB_OUTPUT
          echo "✅ 预览：$URL" >> $GITHUB_STEP_SUMMARY
