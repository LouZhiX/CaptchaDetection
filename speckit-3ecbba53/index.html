<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>需求文档：test1 - SpecKit 计算器</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <h1 class="brand">SpecKit · Calculator</h1>
    <div class="calculator" role="application" aria-label="Calculator">
      <div class="display" id="display" data-testid="display">0</div>
      <div class="keys">
        <button class="key fn" data-action="clear">AC</button>
        <button class="key fn" data-action="sign">±</button>
        <button class="key fn" data-action="percent">%</button>
        <button class="key op" data-action="op" data-op="/">÷</button>

        <button class="key" data-action="digit" data-value="7">7</button>
        <button class="key" data-action="digit" data-value="8">8</button>
        <button class="key" data-action="digit" data-value="9">9</button>
        <button class="key op" data-action="op" data-op="*">×</button>

        <button class="key" data-action="digit" data-value="4">4</button>
        <button class="key" data-action="digit" data-value="5">5</button>
        <button class="key" data-action="digit" data-value="6">6</button>
        <button class="key op" data-action="op" data-op="-">−</button>

        <button class="key" data-action="digit" data-value="1">1</button>
        <button class="key" data-action="digit" data-value="2">2</button>
        <button class="key" data-action="digit" data-value="3">3</button>
        <button class="key op" data-action="op" data-op="+">+</button>

        <button class="key zero" data-action="digit" data-value="0">0</button>
        <button class="key" data-action="dot">.</button>
        <button class="key eq" data-action="equals" data-testid="equals">=</button>
      </div>
    </div>
    <footer class="meta">Generated by SpecKit Pipeline</footer>
  </main>
  <script src="calculator.js"></script>
</body>
</html>
